<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YACTUN Audio Test</title>
  <link rel="stylesheet" href="style.css?v=100" />
</head>
<body>
  <main class="app">
    <section class="card header-card">
      <div class="logo-wrap">
        <img src="assets/logo-yactun-oficial.jpeg" alt="Logo YACTUN" class="logo-zorro" />
      </div>
      <h1>YACTUN</h1>
      <p>Prueba de audio</p>
    </section>

    <section class="card">
      <h2>Prueba de sonidos</h2>
      <p class="muted">Primero toca Activar audio. Luego proba cada sonido.</p>

      <button id="btnActivar">Activar audio</button>
      <button id="btnTap">Tap</button>
      <button id="btnOk">Compra OK</button>
      <button id="btnScan">QR leido</button>
      <button id="btnPremio">Premio</button>
      <button id="btnError" class="btn-secundario">Error</button>

      <p id="msg" class="msg"></p>
    </section>
  </main>

  <script src="audio_test.js?v=100"></script>
</body>
</html>
