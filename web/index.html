<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Yactun</title>

  <link rel="manifest" href="manifest.json?v=10" />
  <meta name="theme-color" content="#8b4a18" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icono-acceso-zorro-180.png?v=10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Yactun" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icono-acceso-zorro-192.png?v=10" />
  <link rel="stylesheet" href="style.css?v=33" />
</head>
<body>
  <main class="app">

    <section class="card header-card">
      <div class="logo-wrap">
        <img src="assets/logo-yactun-oficial.jpeg?v=4" alt="Logo YACTÚN" class="logo-zorro" style="width: 92%; max-width: 520px; height: auto; display: block; margin: 0 auto;" />
      </div>
      <h1>YACTÚN</h1>
      <p>Club de Beneficios</p>
    </section>

    <section id="loadingBox" class="card">
      <p>Cargando...</p>
    </section>

    <section id="registroBox" class="card hidden">
      <h2>Gracias por elegirnos</h2>
      <p class="muted">Completá tus datos para ingresar al Club de Beneficios.</p>

      <label>Nombre</label>
      <input id="nombreInput" type="text" placeholder="Tu nombre" autocomplete="name" />

      <label>Celular</label>
      <input id="celularInput" type="tel" placeholder="Tu celular" autocomplete="tel" />

      <label>Email</label>
      <input id="emailInput" type="email" placeholder="Tu email" autocomplete="email" />

      <button id="registrarBtn">Ingresar al Club</button>

      <p id="registroMsg" class="msg"></p>
    </section>

    <section id="credencialBox" class="card hidden">
      <h2 id="saludoTxt">Hola</h2>
      <p class="muted">Mostrá este código al vendedor</p>

      <div id="qrBox" class="qr-box"></div>

      <div class="codigo-box">
        Código: <strong id="codigoTxt">------</strong>
      </div>

      <div class="puntos-box">
        <div class="puntos-num">
          <span id="puntosTxt">0</span>/<span id="metaTxt">5</span>
        </div>
        <div class="puntos-label">compras acumuladas</div>
      </div>

      <p id="premioTxt" class="premio hidden"></p>

      <button id="actualizarBtn">Ya escaneado / Actualizar</button>

      <p id="credencialMsg" class="msg"></p>
    </section>

    <section id="fiestaBox" class="fiesta hidden">
      🎉
    </section>

  </main>

  <script src="assets/qrcode.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js?v=21"></script>
  <script src="pwa.js?v=2"></script>
</body>
</html>
